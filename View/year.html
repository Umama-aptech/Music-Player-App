<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Year in Music</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 0;
    background-color: #f4f4f4;
}

header {
    background-color: #333;
    color: #fff;
    padding: 1rem;
    text-align: center;
}

main {
    padding: 2rem;
}

.year {
    max-width: 1200px;
    margin: 0 auto;
    background: #fff;
    padding: 2rem;
    border-radius: 8px;
    box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
}

.year h2 {
    margin-top: 0;
}

.months {
    display: flex;
    flex-wrap: wrap;
    gap: 1rem;
}

.month {
    background: #eaeaea;
    padding: 1rem;
    border-radius: 8px;
    flex: 1 1 calc(25% - 1rem);
    box-shadow: 0 0 5px rgba(0, 0, 0, 0.1);
}

.month h3 {
    margin-top: 0;
}

ul {
    list-style-type: none;
    padding: 0;
}

li {
    margin-bottom: 0.5rem;
}

footer {
    background-color: #333;
    color: #fff;
    text-align: center;
    padding: 1rem;
    position: fixed;
    bottom: 0;
    width: 100%;
}

    </style>
</head>
<body>
    <header>
        <h1>Year in Music</h1>
    </header>
    
    <main>
        <section class="year">
            <h2>2024</h2>
            <div class="months">
                <article class="month">
                    <h3>January</h3>
                    <ul>
                        <li>Release: Kaun talha - talha anjum </li>
                        <li>Event: Concert by Young stunners <p>Date:5.june.2024</p></li>
                    </ul>
                </article>
                <article class="month">
                    <h3>February</h3>
                    <ul>
                        <li>Release: Album Title - karan aujia</li>
                        <li>Event: Concert by karan aujia <p>Date:11.aug.2024</p></li>
                    </ul>
                </article>
                <!-- Add more months as needed -->
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2024 Music Website</p>
    </footer>
</body>
</html>
